whisper:
  model_size: small        # tiny | base | small | medium | large
  device: cpu
  compute_type: int8       # int8 is fastest on CPU

captioning:
  provider: ollama         # ollama | anthropic
  # Ollama vision model options (already pulled: qwen2.5vl:7b):
  #   ollama pull qwen2.5vl:7b         (no dash — Ollama registry name)
  #   ollama pull llama3.2-vision:11b
  ollama_model: qwen2.5vl:7b
  ollama_base_url: http://localhost:11434

  # Anthropic settings (active when provider: anthropic)
  # Reads ANTHROPIC_API_KEY from environment automatically
  anthropic_model: claude-haiku-4-5-20251001

  max_tokens: 150

keyframe:
  ssim_threshold: 0.85     # lower = more sensitive to visual changes
  sample_fps: 1            # frames per second to sample (1 = one frame/sec)

slide_processor:
  image_dpi: 150           # render resolution for PDF pages (higher = sharper, larger files)

pdf_processor:
  max_chunk_chars: 2000    # split sections larger than this at paragraph boundaries
  min_heading_size: 14     # font pt size at or above which a line is treated as a heading

vector_retriever:
  model: all-MiniLM-L6-v2    # sentence-transformers model (cached after first download)
  top_k: 5

reranker:
  model: cross-encoder/ms-marco-MiniLM-L-6-v2  # ~22 MB, CPU-friendly cross-encoder

graph_retriever:
  max_hops: 3                 # hard BFS depth cap
  relevance_threshold: 0.4   # cosine similarity cutoff for neighbour expansion
  max_nodes_per_hop: 10       # max neighbours to expand per BFS level
  top_k_anchors: 3            # number of anchor nodes to seed BFS from
  key_term_boost: 0.15        # additive score bonus when a content node's key_term appears in the query

query_router:
  use_llm_fallback: true        # false = heuristics only (faster, less accurate)
  llm_provider: ollama          # ollama | anthropic
  llm_ollama_model: qwen2.5:7b
  llm_ollama_base_url: http://localhost:11434
  llm_anthropic_model: claude-haiku-4-5-20251001
  llm_max_tokens: 50

generator:
  provider: ollama             # ollama | anthropic
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 1024
  max_context_chars: 4000     # chars of retrieved context fed into the generation prompt

multi_hop_reasoner:
  provider: ollama             # ollama | anthropic
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 256
  max_sub_questions: 4        # max number of sub-questions to decompose into

self_rag:
  provider: ollama             # ollama | anthropic
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 256
  max_context_chars: 4000      # chars of retrieved context fed to the reflector (must match generator)

entity_extractor:
  # Optional NER helper used by the Stage-1 extractors. Not required —
  # topic/subtopic/content extractors are LLM-first and NER is currently
  # reserved for future enhancement (seeding prompts with entity candidates).
  ner_backend: gliner              # gliner | spacy

  # GLiNER settings (used when ner_backend: gliner)
  gliner_model: urchade/gliner_medium-v2.1
  gliner_labels:
    - concept
    - process
    - theory
    - law
    - principle
    - entity
    - algorithm
    - model
    - technique
    - method
    - task
    - framework
    - architecture
  gliner_threshold: 0.3

  # spaCy settings (used when ner_backend: spacy)
  # Requires: python -m spacy download en_core_web_sm
  spacy_model: en_core_web_sm

# ----------------------------------------------------------------------
# Stage-1 hierarchical graph extractors
# ----------------------------------------------------------------------

topic_extractor:
  provider: ollama                # ollama | anthropic
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 512
  merge_threshold: 0.85              # cosine cutoff for synonym-swap with existing topic names

subtopic_extractor:
  provider: ollama
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 512
  merge_threshold: 0.82
  max_workers: 4          # parallel LLM calls; set OLLAMA_NUM_PARALLEL to the same value

content_synthesizer:
  provider: ollama
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 2000
  merge_threshold: 0.88              # cosine cutoff for synonym-swap on content titles
  # max_per_chunk: omitted → dynamic based on chunk length (3/5/7/10). Set an int to override.

semantic_linker:
  provider: ollama
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 512
  sim_lo: 0.55                       # related-but-not-duplicate lower bound
  sim_hi: 0.90                       # upper bound (higher = suspected duplicate)
  max_candidate_pairs: 80            # LLM budget cap per ingest
  batch_size: 10                     # pairs per LLM call
  min_confidence: 0.3                # drop edges below this confidence

# ----------------------------------------------------------------------
# Illustration worker — deterministic asset resolver for content nodes
#   equations  → rendered to PNG via matplotlib.mathtext (no TeX install needed)
#   diagram/image → sourced from images extracted during ingestion
#   code / no match → illustration_path left null
# ----------------------------------------------------------------------

illustration_worker:
  enabled: true
  latex_dpi: 150            # DPI for equation PNG renders

# ----------------------------------------------------------------------
# Quiz & Exam Generator
# ----------------------------------------------------------------------

quiz_generator:
  provider: ollama
  ollama_model: qwen2.5:7b
  ollama_base_url: http://localhost:11434
  anthropic_model: claude-haiku-4-5-20251001
  max_tokens: 8192
  context_chars: 24000
  batch_size: 1   # qwen2.5:7b reliably returns 1 question per call; set higher for larger models
